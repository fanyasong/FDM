# Entropy architecture pretraining config
# Results in checkpoints/entropy_pretrain/best.pt
# Val PPL: 3.88 (chr17 validation set)

model:
  vocab_size: 6          # A T G C N PAD
  d_model: 512
  n_layers: 8
  dropout: 0.1
  p_scales:  [0.99, 0.50, 0.25, 0.125, 0.063, 0.031, 0.016, 0.004]
  win_sizes: [8,    8,    16,   32,    64,    128,   256,   512  ]
  k_vals:    [128,  64,   32,   16,    8,     4,     4,     4    ]

training:
  seq_len: 512
  batch_size: 8
  steps: 100000
  lr: 3.0e-4
  warmup_steps: 2000
  val_chrom: chr17
  train_chroms: [chr1, chr2, chr3, chr4, chr5, chr6, chr7, chr8,
                 chr9, chr10, chr11, chr12, chr13, chr14, chr15,
                 chr16, chr18, chr19, chr20, chr21, chr22, chrX]

hardware:
  # Single RTX 5090 (24 GB), ~12 hours
  gradient_checkpointing: false
